{% extends 'base.html' %}

{% block title %}Work Orders - DjangoApp{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>My Work Orders</h3>
        <!-- <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Back to Dashboard</a> -->
    </div>

    <div id="message" class="mb-3"></div>

    <div class="table-responsive">
        <table class="table table-striped" id="workorders-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>WO Number</th>
                    <th>Client</th>
                    <th>Sector</th>
                    <th>Term</th>
                    <th>Support</th>
                    <th>Country</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="8">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadWorkOrders() {
    const msgEl = document.getElementById('message');
    const tbody = document.querySelector('#workorders-table tbody');
    tbody.innerHTML = '<tr><td colspan="8">Loading...</td></tr>';

    try {
        const res = await fetch('/api/auth/workorders/', { credentials: 'same-origin' });
        if (res.status === 403) {
            msgEl.innerHTML = '<div class="alert alert-warning">You must be logged in to view work orders.</div>';
            tbody.innerHTML = '<tr><td colspan="8">--</td></tr>';
            return;
        }
        if (!res.ok) throw new Error('Network response not ok');

        const data = await res.json();
        // API may return paginated object or plain array
        const items = Array.isArray(data) ? data : (data.results || []);

        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="9">No work orders found.</td></tr>';
            return;
        }
        // helper: escape HTML
        const escapeHtml = (s) => {
            if (s == null) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        };

        // helper: robust country renderer
        const renderCountry = (w) => {
            const c = w && w.country;
            if (!c) return (w && (w.country_name)) || '';
            if (typeof c === 'string') return c;
            if (typeof c === 'object') return c.country_name || c.code || '';
            return String(c);
        };

        tbody.innerHTML = items.map(w => `
            <tr>
                <td>${escapeHtml(w.id || '')}</td>
                <td>${escapeHtml(w.work_order_number || '')}</td>
                <td>${escapeHtml(w.client || '')}</td>
                <td>${escapeHtml(w.sector || '')}</td>
                <td>${escapeHtml(w.term || '')}</td>
                <td>${escapeHtml(w.support || '')}</td>
                <td>${escapeHtml(w.country_name || '')}</td>
                <td>${escapeHtml(w.created_at || '')}</td>
                    <td><a class="btn btn-sm btn-primary" href="/dashboard/?edit=${encodeURIComponent(w.id || '')}">Edit</a></td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Failed to load work orders', err);
        msgEl.innerHTML = '<div class="alert alert-danger">Failed to load work orders.</div>';
        tbody.innerHTML = '<tr><td colspan="8">Error</td></tr>';
    }
}
// <td><a class="btn btn-sm btn-danger" href="/dashboard/?delete=${encodeURIComponent(w.id || '')}">Delete</a></td>
// add delete handler by calling delete API and reloading list on success
document.addEventListener('click', async (e) => {
    if (e.target.matches('.btn-danger')) {
        e.preventDefault();
        const href = e.target.getAttribute('href');
        const urlParams = new URLSearchParams(href.split('?')[1]);
        const id = urlParams.get('delete');
        if (!id) return alert('Invalid work order ID for deletion.');
        if (!confirm('Are you sure you want to delete this work order? This action cannot be undone.')) return;

        try {
            const res = await fetch(`/api/auth/workorders/${encodeURIComponent(id)}/`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });
            if (res.status === 403) {
                alert('You must be logged in to delete work orders.');
                return;
            }
            if (!res.ok) throw new Error('Network response not ok');
            alert('Work order deleted successfully.');
            loadWorkOrders();
        } catch (err) {
            console.error('Failed to delete work order', err);
            alert('Failed to delete work order.');
        }
    }
});

document.addEventListener('DOMContentLoaded', loadWorkOrders);
</script>
{% endblock %}
